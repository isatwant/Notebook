<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Note Book</title>
</head>

<body>
    <header class="header-style">
        <div class="logo">
            NoteBook
        </div>
    </header>

    <section>
        <aside class="aside_left">
            <div class="read-btn">
                <button class="btn"> Read Book </button>
                <span class="tool-tip"> Read Note Book </span>
            </div>
        </aside>

        <div class="note-txtarea">
            <ul class="toolbar">
                <li><button> Save </button></li>
                <li> <button> New </button></li>
                <li> <button> Erase </button> </li>
            </ul>
            <textarea placeholder="Write your new thoughts here"></textarea>
        </div>

        <aside class="aside_right">
            <div class="add-to-book-btn ">
                <button class="btn"> Add To Book </button>
                 <span class="tool-tip"> Add Your New Notes to Book  </span>
            </div>
        </aside>
    </section>

    <footer>
        i am footer
    </footer>
</body>

</html>
