<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Note Book</title>
</head>

<body>

    <header class="header-style">
        <div class="logo">
            NoteBook
        </div>
        <button class="menu-toggle">☰</button>
    </header>

    <section>
        <!-- Left Sidebar -->
        <aside class="sidebar">

            <button class="sidebar-btn">
                📚 Existed Books
            </button>

            <button class="sidebar-btn">
                ➕ Create New Book
            </button>

            <button class="sidebar-btn">
                📝 Drafted Pages
            </button>

            <button class="sidebar-btn">
                ⭐ Favorites
            </button>

            <button class="sidebar-btn">
                🗑️ Trash
            </button>

            <button class="sidebar-btn">
                ⚙️ Settings
            </button>
        </aside>

        <!-- Main Editor -->
        <div class="editor-area">

            <div class="editor-header">
                <input class="book-name" placeholder="Untitled Note">
                <span class="save-status">✓ Auto Saved</span>
            </div>

            <ul class="toolbar">
                <li><button class="editor-btn">B</button></li>
                <li><button class="editor-btn">I</button></li>
                <li><button class="editor-btn">U</button></li>
                <li><button>Save</button></li>
            </ul>

            <div id="editor" contenteditable="true" class="editor-box"></div>

            <div class="editor-footer">
                <span>Words: 0</span>
                <span>Characters: 0</span>
                <span>Last Edited: Today</span>
            </div>

        </div>

    </section>


</body>
<script>
    // Function For Active Button
    const side_btn = document.querySelectorAll(".sidebar-btn");
    side_btn.forEach(buttons => {
        buttons.addEventListener("click", function () {
            document.querySelector(".sidebar-btn.active")?.classList.remove("active");
            this.classList.add("active");
        });
    });

    // Function For Toggle Button
    const editor_btn = document.querySelectorAll(".editor-btn");
    editor_btn.forEach(buttons => {
        buttons.addEventListener("click", function () {
            this.classList.toggle("active");
        });
    });
    // Function For Toggle Side bar
    const toggleBtn = document.querySelector(".menu-toggle");
    const sidebar = document.querySelector(".sidebar");

    toggleBtn.addEventListener("click", () => {
        sidebar.classList.toggle("show");
    });
</script>

</html>
